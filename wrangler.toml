# Cloudflare Pages deployment configuration
# This tells Cloudflare how to build the Expo web app

[build]
  command = "npm run export"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Expo public env vars must also be set in the Cloudflare Pages dashboard
  # under Settings > Environment variables:
  #   EXPO_PUBLIC_SUPABASE_URL
  #   EXPO_PUBLIC_SUPABASE_ANON_KEY

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
